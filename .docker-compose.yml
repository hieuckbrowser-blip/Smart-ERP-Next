services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    depends_on:
      - db

  web:
    image: smart-erp-web:latest
    ports:
      - "3001:3001"

  ai-forecast:
    image: python:3.11-slim
    ports:
      - "8000:8000"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:

networks:
  erp-network:
