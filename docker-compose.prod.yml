# Smart ERP Next — Production multi-container deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires .env.production or set environment variables

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smart_erp} -d smart_erp"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      start_period: 30s
    networks:
      - smart-erp-network
    restart: unless-stopped

  api:
    image: ghcr.io/hieuck/smart-erp-next:${IMAGE_TAG:-latest}
    container_name: smart-erp-api
    command: ["node", "/app/apps/api/dist/apps/api/src/main.js"]
    ports:
      - "${API_PORT:-3456}:3456"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smart_erp}:${DB_PASSWORD}@postgres:5432/smart_erp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3457}
      NODE_ENV: production
      PORT: 3456
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3456/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smart-erp-network
    restart: unless-stopped

  web:
    image: ghcr.io/hieuck/smart-erp-next:${IMAGE_TAG:-latest}
    container_name: smart-erp-web
    command: ["node", "/app/scripts/run-web-start.js", "--", "-p", "3457"]
    ports:
      - "${WEB_PORT:-3457}:3457"
    working_dir: /app/apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3456}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3457}
      NODE_ENV: production
      PORT: 3457
    depends_on:
      - api
    networks:
      - smart-erp-network
    restart: unless-stopped

networks:
  smart-erp-network:
    driver: bridge

volumes:
  postgres_data:
