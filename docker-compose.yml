services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smart_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smart_erp} -d smart_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - smart-erp-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smart-erp-api
    ports:
      - "${API_PORT:-3456}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smart_erp}:${DB_PASSWORD:-smart_erp}@postgres:5432/smart_erp
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: 3000
      AI_FORECAST_URL: http://ai-forecast:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3457,http://localhost:3456}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - smart-erp-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3456}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3457}
        NODE_ENV: production
    container_name: smart-erp-web
    ports:
      - "${WEB_PORT:-3457}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3456}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3457}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - smart-erp-network

  ai-forecast:
    profiles: ["ai"]
    build:
      context: ./apps/ai-forecast
      dockerfile: Dockerfile
    container_name: smart-erp-ai-forecast
    ports:
      - "${AI_FORECAST_PORT:-8000}:8000"
    environment:
      PORT: 8000
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - smart-erp-network

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: smart-erp-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - smart-erp-network

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: smart-erp-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - smart-erp-network

networks:
  smart-erp-network:
    driver: bridge

volumes:
  postgres_data:
  api_uploads:
  prometheus_data:
  grafana_data:
