# Smart ERP Next — Quick start
# Usage: docker compose up -d
# Pulls pre-built image from GHCR (no build required)

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smart_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smart_erp} -d smart_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smart-erp-network

  app:
    image: ghcr.io/hieuck/smart-erp-next:latest
    container_name: smart-erp-app
    ports:
      - "${API_PORT:-3456}:3456"
      - "${WEB_PORT:-3457}:3457"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smart_erp}:${DB_PASSWORD:-smart_erp}@postgres:5432/smart_erp
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NEXT_PUBLIC_API_URL: http://localhost:3456
      NEXT_PUBLIC_SITE_URL: http://localhost:3457
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3457,http://localhost:3456}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3456/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smart-erp-network

networks:
  smart-erp-network:

volumes:
  postgres_data:
