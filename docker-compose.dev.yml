# Build from source (for development / customization)
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smart_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smart_erp} -d smart_erp"]
    networks:
      - smart-erp-network

  app:
    build: .
    container_name: smart-erp-app
    ports:
      - "${API_PORT:-3456}:3456"
      - "${WEB_PORT:-3457}:3457"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smart_erp}:${DB_PASSWORD:-smart_erp}@postgres:5432/smart_erp
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NEXT_PUBLIC_API_URL: http://localhost:3456
      NEXT_PUBLIC_SITE_URL: http://localhost:3457
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-erp-network

networks:
  smart-erp-network:

volumes:
  postgres_data:
