name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write
  packages: write

jobs:
  mobile-native-artifacts:
    name: Build Android and iOS artifacts
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
      ASC_API_KEY_PATH: ${{ secrets.ASC_API_KEY_PATH }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate iOS release prerequisites
        env:
          SKIP_IOS_SIGNING: ${{ secrets.EAS_IOS_CREDENTIALS_READY == '' && 'true' || '' }}
        run: pnpm verify:ios-release-prereqs

      - name: Build Android installable artifact with EAS
        if: env.EXPO_TOKEN != ''
        shell: bash
        run: |
          mkdir -p artifacts/eas
          pnpm --filter @smart-erp/mobile exec eas build --platform android --profile production --non-interactive --wait --json > artifacts/eas/android.json
          node scripts/download-eas-artifacts.js artifacts/eas/android.json artifacts

      - name: Build iOS installable artifact with EAS
        if: env.EXPO_TOKEN != ''
        shell: bash
        env:
          EAS_BUILD_PROFILE: ${{ secrets.EAS_IOS_CREDENTIALS_READY == '' && 'ios-unsigned' || 'production' }}
        run: |
          mkdir -p artifacts/eas
          pnpm --filter @smart-erp/mobile exec eas build --platform ios --profile "$EAS_BUILD_PROFILE" --non-interactive --wait --json > artifacts/eas/ios.json
          node scripts/download-eas-artifacts.js artifacts/eas/ios.json artifacts

      - name: Upload mobile native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-native-artifacts
          path: |
            artifacts/android
            artifacts/ios
          if-no-files-found: warn

  windows-native-artifacts:
    name: Build Windows installer
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        continue-on-error: true
        run: choco install nsis -y

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        continue-on-error: true
        run: pnpm --filter @smart-erp/desktop windows:build

      - name: Stage Windows installer
        if: success()
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts/windows | Out-Null
          Copy-Item "apps/desktop/src-tauri/target/release/bundle/nsis/*" artifacts/windows/

      - name: Upload Windows native artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-artifacts
          path: artifacts/windows
          if-no-files-found: warn

  docker-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-erp-next/api:${{ github.event.inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smart-erp-next/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-erp-next/web:${{ github.event.inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smart-erp-next/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push unified image (API + Web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:${{ github.event.inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  certify-release:
    name: Certify release gates
    runs-on: ubuntu-latest
    needs:
      - docker-images
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-native-artifacts'
          path: artifacts
          merge-multiple: true

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Apply database migrations + seed
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
        run: |
          pnpm exec drizzle-kit migrate
          cd ../..
          node apps/api/dist/apps/api/src/common/seeds/main.seed.js

      - name: Build web
        run: pnpm --filter @smart-erp/web build

      - name: Run Playwright E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: release-e2e-secret
        run: pnpm test:e2e

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push --delete origin "$VERSION" 2>/dev/null || true
          gh release create "$VERSION" \
            --title "Smart ERP Next $VERSION" \
            --notes-file release-notes.md \
            --draft=false
