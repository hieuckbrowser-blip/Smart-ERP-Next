name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.1.0)
        required: true
        default: v0.1.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  docker-images:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SBOM
        run: node scripts/generate-sbom.js sbom.json

      - name: Upload SBOM as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Build and push unified image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:${{ github.event.inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - docker-images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: node scripts/generate-release-notes.js

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --title "Smart ERP Next $VERSION" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            --draft=false
