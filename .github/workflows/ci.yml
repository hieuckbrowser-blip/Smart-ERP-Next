name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Check i18n keys and encoding
        run: pnpm audit:i18n

      - name: Check i18n locale parity
        run: pnpm audit:i18n-parity

      - name: Check committed secrets
        run: pnpm audit:secrets

      - name: Run commit quality gate
        run: pnpm qa:commit

      - name: Run unit tests
        run: pnpm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Apply database migrations + seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
        run: |
          cd packages/database && pnpm exec drizzle-kit migrate
          cd ../.. && npx tsx apps/api/src/common/seeds/main.seed.ts

      - name: Run API E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret
          NODE_ENV: test
        run: pnpm test:api:e2e

      - name: Run web E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret
          NEXT_PUBLIC_API_URL: http://localhost:3456
          NODE_ENV: test
          PORT: '3001'
          LOGIN_RATE_LIMIT: '1000'
        run: pnpm test:e2e
