name: Deploy Staging

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate staging configuration
        if: vars.STAGING_ENABLED == 'true'
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          test -n "$STAGING_HOST" || { echo 'Missing STAGING_HOST secret'; exit 1; }
          test -n "$STAGING_USER" || { echo 'Missing STAGING_USER secret'; exit 1; }
          test -n "$STAGING_SSH_KEY" || { echo 'Missing STAGING_SSH_KEY secret'; exit 1; }

      - name: Log in to GitHub Container Registry
        if: vars.STAGING_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: vars.STAGING_ENABLED == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push staging image
        if: vars.STAGING_ENABLED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/smart-erp-next:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to staging
        if: vars.STAGING_ENABLED == 'true'
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/smart-erp-next:staging
            cd /opt/smart-erp-next
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
